<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign In | Jupiter Company</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    <style>
        :root {
            /* Jupiter Color Palette */
            --jup-dark: #463020;      /* Deep Storm Brown */
            --jup-ochre: #A57E55;     /* Main Cloud Band */
            --jup-red: #8B3E2F;       /* Great Red Spot Accent */
            --jup-cream: #E3D3C4;     /* Light Atmospheric Band */
            --jup-bg: #F9F7F5;        /* Soft Off-white */
        }

        body {
            background-color: var(--jup-bg);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-container {
            width: 100%;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(70, 48, 32, 0.08);
            overflow: hidden;
        }

        .card-header {
            background-color: white;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 2rem 1.5rem 1rem;
            text-align: center;
        }

        .brand-text {
            color: var(--jup-dark);
            font-weight: 700;
            letter-spacing: -0.5px;
            font-size: 1.5rem;
            margin-bottom: 0;
        }

        .brand-subtext {
            color: var(--jup-ochre);
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .form-label {
            color: var(--jup-dark);
            font-weight: 600;
            font-size: 0.85rem;
        }

        .form-control {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--jup-cream);
        }

        .form-control:focus {
            border-color: var(--jup-ochre);
            box-shadow: 0 0 0 0.25rem rgba(165, 126, 85, 0.15);
        }

        .btn-jupiter {
            background-color: var(--jup-dark);
            color: white;
            border-radius: 8px;
            font-weight: 600;
            padding: 12px;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-jupiter:hover {
            background-color: var(--jup-red);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(139, 62, 47, 0.2);
        }

        .forgot-link {
            color: var(--jup-ochre);
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: var(--jup-red);
        }

        .alert {
            border-radius: 8px;
            border: none;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <div class="container login-container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">
                
                <div class="card">
                    <div class="card-header">
                        <h1 class="brand-text">Jupiter</h1>
                        <div class="brand-subtext">Enterprise Access</div>
                    </div>
                    
                    <div class="card-body p-4 p-md-5">
                        <form th:action="@{/authenticateTheUser}" method="POST">

                            <div th:if="${param.error}" class="mb-4">
                                <div class="alert alert-danger d-flex align-items-center" role="alert">
                                    Invalid credentials. Please try again.
                                </div>
                            </div>

                            <div th:if="${param.logout}" class="mb-4">
                                <div class="alert alert-light border d-flex align-items-center" role="alert" style="background-color: var(--jup-bg);">
                                    Logged out successfully.
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" id="username" name="username" class="form-control" placeholder="Enter your ID" required autofocus />
                            </div>

                            <div class="mb-4">
                                <div class="d-flex justify-content-between align-items-center">
                                    <label for="password" class="form-label">Password</label>
                                    <a href="#" class="text-decoration-none small forgot-link mb-2">Forgot?</a>
                                </div>
                                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required />
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-jupiter">Sign In</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-4 text-muted" style="font-size: 0.75rem; opacity: 0.8;">
                    &copy; 2026 The Jupiter Company.
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
