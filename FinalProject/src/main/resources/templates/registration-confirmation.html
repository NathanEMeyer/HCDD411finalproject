<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Confirmed | Jupiter Company</title>
    
	<style>
	        :root {
	            /* Jupiter Palette: Deep space, gas giant tans, and Great Red Spot accents */
	            --space-bg: #05070a;
	            --jupiter-band-1: #2d1e17;
	            --jupiter-band-2: #4a3b31;
	            --jupiter-gold: #c5a36b;
	            --accent-red: #8e3a31;
	            --text-light: #e0e0e0;
	            --glass-bg: rgba(255, 255, 255, 0.05);
	        }

	        body {
	            margin: 0;
	            padding: 0;
	            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
	            background: radial-gradient(circle at center, var(--jupiter-band-2) 0%, var(--space-bg) 100%);
	            background-attachment: fixed;
	            color: var(--text-light);
	            display: flex;
	            justify-content: center;
	            align-items: center;
	            min-height: 100vh;
	            overflow-x: hidden;
	        }

	        /* Subtle atmospheric overlay */
	        body::before {
	            content: "";
	            position: absolute;
	            width: 100%;
	            height: 100%;
	            background: repeating-linear-gradient(
	                0deg,
	                transparent,
	                transparent 40px,
	                rgba(197, 163, 107, 0.03) 41px,
	                transparent 42px
	            );
	            pointer-events: none;
	        }

	        .confirmation-card {
	            background: var(--glass-bg);
	            backdrop-filter: blur(15px);
	            border: 1px solid rgba(255, 255, 255, 0.1);
	            border-radius: 20px;
	            padding: 40px;
	            width: 100%;
	            max-width: 450px;
	            text-align: center;
	            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
	                        inset 0 0 20px rgba(197, 163, 107, 0.05);
	            z-index: 1;
	        }

	        .success-icon {
	            font-size: 50px;
	            color: var(--jupiter-gold);
	            margin-bottom: 20px;
	            text-shadow: 0 0 15px rgba(197, 163, 107, 0.4);
	        }

	        h2 {
	            margin: 0;
	            font-weight: 300;
	            letter-spacing: 2px;
	            text-transform: uppercase;
	            color: #fff;
	        }

	        .subtext {
	            color: #a0a0a0;
	            font-size: 0.95rem;
	            margin: 15px 0 30px;
	            line-height: 1.6;
	        }

	        .user-details {
	            background: rgba(0, 0, 0, 0.3);
	            border-radius: 12px;
	            padding: 20px;
	            margin-bottom: 30px;
	            text-align: left;
	            border-left: 3px solid var(--jupiter-gold);
	        }

	        .detail-item {
	            margin-bottom: 15px;
	            display: flex;
	            flex-direction: column;
	        }

	        .detail-label {
	            font-size: 0.75rem;
	            text-transform: uppercase;
	            color: var(--jupiter-gold);
	            letter-spacing: 1px;
	            margin-bottom: 4px;
	        }

	        .detail-value {
	            font-family: 'Courier New', monospace; /* Tech feel */
	            font-size: 1.1rem;
	            color: #fff;
	        }

	        .btn-login {
	            display: inline-block;
	            background: linear-gradient(135deg, var(--jupiter-gold) 0%, #8e7a56 100%);
	            color: #1a1a1a;
	            text-decoration: none;
	            padding: 14px 30px;
	            border-radius: 30px;
	            font-weight: bold;
	            text-transform: uppercase;
	            letter-spacing: 1px;
	            transition: all 0.3s ease;
	            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
	        }

	        .btn-login:hover {
	            transform: translateY(-2px);
	            box-shadow: 0 6px 20px rgba(197, 163, 107, 0.3);
	            filter: brightness(1.1);
	        }

	        .footer-note {
	            margin-top: 25px;
	            font-size: 0.7rem;
	            color: #666;
	            text-transform: uppercase;
	            letter-spacing: 2px;
	        }
	    </style>
	
</head>

<body>

    <div class="confirmation-card">
        <div class="success-icon">✓</div>
        <h2>Account Created</h2>
        <p class="subtext">Your credentials have been securely registered in the Jupiter Company system.</p>

        <div class="user-details">
            <div class="detail-item">
                <span class="detail-label">Username</span>
                <span th:text="${webUser.userName}">jupiter_company</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Full Name</span>
                <span th:text="${webUser.firstName} + ' ' + ${webUser.lastName}">Jack Foot</span>
            </div>
            <div class="detail-item" style="margin-bottom: 0;">
                <span class="detail-label">Email Address</span>
                <span th:text="${webUser.email}">j.foot@example.com</span>
            </div>
        </div>

        <a th:href="@{/showMyLoginPage}" class="btn-login">Proceed to Login</a>
    </div>

</body>

</html>
