<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Registration | Jupiter Company</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
	        :root {
	            /* Jupiter Orbital Palette */
	            --space-black: #080a0f;
	            --jupiter-core: #2d1e17;
	            --jupiter-gold: #c5a36b;
	            --jupiter-tan: #4a3b31;
	            --glow-white: rgba(255, 255, 255, 0.9);
	            --glass-bg: rgba(255, 255, 255, 0.04);
	            --error-red: #ff4d4d;
	        }

	        body {
	            background: radial-gradient(circle at 50% 120%, var(--jupiter-tan) 0%, var(--space-black) 80%);
	            background-attachment: fixed;
	            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
	            color: var(--glow-white);
	            min-height: 100vh;
	        }

	        /* Subtle planetary scan-line effect */
	        body::after {
	            content: "";
	            position: fixed;
	            top: 0; left: 0; width: 100%; height: 100%;
	            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
	                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
	            background-size: 100% 3px, 3px 100%;
	            pointer-events: none;
	            z-index: 10;
	        }

	        .registration-container {
	            margin-top: 50px;
	            margin-bottom: 50px;
	        }

	        .card {
	            background: var(--glass-bg);
	            backdrop-filter: blur(20px);
	            border: 1px solid rgba(255, 255, 255, 0.1);
	            border-radius: 16px;
	            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
	            overflow: hidden;
	        }

	        .card-header {
	            background: linear-gradient(to right, #1a1a1a, var(--jupiter-core)) !important;
	            color: var(--jupiter-gold) !important;
	            font-weight: 300;
	            text-align: center;
	            padding: 2rem 1.5rem;
	            border-bottom: 1px solid rgba(197, 163, 107, 0.2) !important;
	            font-size: 1.4rem;
	            text-transform: uppercase;
	            letter-spacing: 3px;
	        }

	        .form-label {
	            font-weight: 500;
	            color: var(--jupiter-gold);
	            font-size: 0.75rem;
	            text-transform: uppercase;
	            letter-spacing: 1px;
	            margin-bottom: 0.5rem;
	        }

	        .form-control {
	            background: rgba(0, 0, 0, 0.4);
	            border: 1px solid rgba(255, 255, 255, 0.1);
	            color: #fff;
	            padding: 0.8rem;
	            transition: all 0.3s ease;
	        }

	        .form-control:focus {
	            background: rgba(0, 0, 0, 0.6);
	            border-color: var(--jupiter-gold);
	            color: #fff;
	            box-shadow: 0 0 12px rgba(197, 163, 107, 0.2);
	        }

	        .form-control::placeholder {
	            color: #555;
	            font-size: 0.9rem;
	        }

	        .btn-jupiter {
	            background: linear-gradient(135deg, var(--jupiter-gold) 0%, #8e7a56 100%);
	            border: none;
	            color: #1a1a1a;
	            padding: 0.9rem;
	            font-weight: 700;
	            text-transform: uppercase;
	            letter-spacing: 2px;
	            transition: all 0.3s ease;
	            margin-top: 10px;
	        }

	        .btn-jupiter:hover {
	            transform: translateY(-2px);
	            box-shadow: 0 8px 20px rgba(197, 163, 107, 0.3);
	            filter: brightness(1.1);
	        }

	        .text-danger {
	            color: var(--error-red) !important;
	            font-size: 0.8rem;
	            font-weight: 500;
	        }

	        .required-mark {
	            color: var(--jupiter-gold);
	            opacity: 0.6;
	        }

	        .card-footer {
	            background: rgba(0, 0, 0, 0.2) !important;
	            border-top: 1px solid rgba(255, 255, 255, 0.05) !important;
	        }

	        a {
	            color: var(--jupiter-gold);
	            transition: 0.3s;
	        }

	        a:hover {
	            color: #fff;
	            text-shadow: 0 0 8px var(--jupiter-gold);
	        }
	    </style>
</head>

<body>

<div class="container registration-container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card">
                <div class="card-header">
                    Create Portal Account
                </div>

                <div class="card-body p-4">
                    <p class="text-muted text-center mb-4 small">
                        Please provide your details below to register for the Jupiter Company Portal.
                    </p>

                    <form th:action="@{/register/processRegistrationForm}" th:object="${webUser}" method="POST">

                        <div th:if="${param.registrationError}" class="alert alert-danger">
                            <span th:text="${param.registrationError}"></span>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Username <span class="required-mark">*</span></label>
                            <input type="text" th:field="*{userName}" class="form-control" placeholder="Choose a unique ID" />
                            <div th:if="${#fields.hasErrors('userName')}" class="text-danger">
                                <ul><li th:each="err : ${#fields.errors('userName')}" th:text="${err}" /></ul>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password <span class="required-mark">*</span></label>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="Minimum 8 characters" />
                            <div th:if="${#fields.hasErrors('password')}" class="text-danger">
                                <ul><li th:each="err : ${#fields.errors('password')}" th:text="${err}" /></ul>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">First Name <span class="required-mark">*</span></label>
                                <input type="text" th:field="*{firstName}" class="form-control" />
                                <div th:if="${#fields.hasErrors('firstName')}" class="text-danger">
                                    <ul><li th:each="err : ${#fields.errors('firstName')}" th:text="${err}" /></ul>
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Last Name <span class="required-mark">*</span></label>
                                <input type="text" th:field="*{lastName}" class="form-control" />
                                <div th:if="${#fields.hasErrors('lastName')}" class="text-danger">
                                    <ul><li th:each="err : ${#fields.errors('lastName')}" th:text="${err}" /></ul>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Email Address <span class="required-mark">*</span></label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="user@psu.edu" />
                            <div th:if="${#fields.hasErrors('email')}" class="text-danger">
                                <ul><li th:each="err : ${#fields.errors('email')}" th:text="${err}" /></ul>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-psu">Complete Registration</button>
                        </div>

                    </form>
                </div>
                
                <div class="card-footer bg-white border-0 text-center pb-4">
                    <span class="text-muted small">Already have an account?</span>
                    <a th:href="@{/showMyLoginPage}" class="small text-decoration-none" style="color: var(--psu-blue); font-weight: 600;">Sign In</a>
                </div>
            </div>

            <div class="text-center mt-4">
                <p class="text-muted small">&copy; 2026 The Jupiter Company | Jupiter Company</p>
            </div>

        </div>
    </div>
</div>

</body>
</html>
